name: ai-dam
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Deep learning ─────────────────────────────────────────────────────────
  - pytorch>=2.2.0
  - torchvision>=0.17.0
  - cpuonly                        # remove this line if you have a GPU

  # ── Image handling ────────────────────────────────────────────────────────
  - pillow>=10.0.0

  # ── Numerics ──────────────────────────────────────────────────────────────
  - numpy>=1.26.0

  # ── Vector search ─────────────────────────────────────────────────────────
  - faiss-cpu>=1.8.0               # use faiss-gpu if GPU available

  # ── Progress bar ──────────────────────────────────────────────────────────
  - tqdm>=4.66.0

  # ── pip-only packages ─────────────────────────────────────────────────────
  - pip
  - pip:
      # UI
      - streamlit>=1.32.0

      # BLIP image captioning
      - transformers>=4.35.0
      - accelerate>=0.26.0

      # Sentence embeddings + CrossEncoder
      - sentence-transformers>=2.6.0

      # Document parsers
      - pymupdf>=1.23.0
      - python-docx>=1.1.0
      - python-pptx>=0.6.23

      # CLIP (not on PyPI)
      - git+https://github.com/openai/CLIP.git